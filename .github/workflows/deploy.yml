name: Deploy Prod
on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: depromeet/17th-team1-client/globber-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/depromeet/17th-team1-client/globber-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://globber.world/api
            NEXT_PUBLIC_REDIRECT_ORIGIN=https://globber.world
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_S3_BASE_URL=https://globber-prod.s3.ap-northeast-2.amazonaws.com/
            GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull & Deploy
        run: |
          docker pull ghcr.io/depromeet/17th-team1-client/globber-frontend:latest
          cd ~/17th-team1-client
          docker compose -f docker-compose-prod.yml up -d --no-build
          docker image prune -f
