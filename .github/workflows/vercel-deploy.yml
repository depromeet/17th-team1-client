name: Sync to Fork Repository for Vercel

on:
  push:
    branches: ['develop']

jobs:
  sync-to-fork:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout organization repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to fork repository main branch
        env:
          GITHUB_TOKEN: ${{ secrets.VERCEL_DEPLOY }}
          FORK_REPO: yuminnnnni/17th-team1-client
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "${{ secrets.VERCEL_DEPLOY_EMAIL }}"

          git remote add fork https://x-access-token:${GITHUB_TOKEN}@github.com/${FORK_REPO}.git

          # Try regular push first
          git push fork HEAD:main || {
            echo "Regular push failed, trying force push"
            git push fork HEAD:main --force
          }
